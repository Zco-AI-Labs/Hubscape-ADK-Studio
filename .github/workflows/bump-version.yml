name: Auto Bump Version and Release

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Calculate and Bump Version
        run: |
          python -c "
          import re
          import subprocess

          # Read current version
          try:
              with open('hubscape_adk/version.txt', 'r') as f:
                  current_version = f.read().strip()
          except Exception:
              current_version = '1.0.0'

          print(f'Current version: {current_version}')
          major, minor, patch = map(int, current_version.split('.'))

          # Fetch commits since last tag or check recent commits
          try:
              commits = subprocess.check_output(['git', 'log', 'HEAD~1..HEAD', '--pretty=%s']).decode('utf-8')
          except Exception:
              commits = ''

          print('Commits evaluated:')
          print(commits)

          # Determine bump type based on Conventional Commits
          if any(re.match(r'^(feat|minor)(\(.*\))?:', commit, re.IGNORECASE) for commit in commits.split('\n')):
              minor += 1
              patch = 0
              print('Detected FEATURE commit. Bumping MINOR version.')
          elif any(re.match(r'^(major|breaking)(\(.*\))?:', commit, re.IGNORECASE) for commit in commits.split('\n')):
              major += 1
              minor = 0
              patch = 0
              print('Detected BREAKING commit. Bumping MAJOR version.')
          else:
              patch += 1
              print('Detected fix/chore/misc commit. Bumping PATCH version.')

          new_version = f'{major}.{minor}.{patch}'
          print(f'New version: {new_version}')

          with open('hubscape_adk/version.txt', 'w') as f:
              f.write(new_version + '\n')
          "

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "GitHub Actions Auto Bumper"
          git config --global user.email "actions@github.com"
          git add hubscape_adk/version.txt
          
          # Read new version for tagging
          NEW_VERSION=$(cat hubscape_adk/version.txt)
          
          git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]" || exit 0
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin main --follow-tags
